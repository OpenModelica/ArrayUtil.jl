name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'
  workflow_dispatch:

# Cancel superseded runs of the same ref, but keep master runs queued.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            version: '1.12'
          - os: windows-latest
            arch: x64
            version: '1.12'
          - os: macos-latest
            arch: aarch64
            version: '1.12'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Julia ${{ matrix.version }}-${{ matrix.arch }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2
        with:
          cache-registries: 'true'

      - name: Build
        # bash on every runner so we do not have to escape quotes for PowerShell.
        # ImmutableList and MetaModelica live in the OpenModelicaRegistry, not
        # the General registry, so we register it before resolving.
        shell: bash
        run: |
          julia --color=yes --project -e '
            import Pkg
            Pkg.Registry.add("General")
            Pkg.Registry.add(Pkg.RegistrySpec(url = "https://github.com/OpenModelica/OpenModelicaRegistry.git"))
            Pkg.instantiate()
            Pkg.build(; verbose = true)
          '

      - name: Test
        shell: bash
        run: |
          julia --color=yes --project -e '
            import Pkg
            Pkg.test("ArrayUtil"; coverage = true)
          '

      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
